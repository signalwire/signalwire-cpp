# C++ has no central package registry. We publish a source tarball
# and pre-built static libraries as GitHub Release assets.
name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0). Must already exist.'
        required: true

jobs:
  # ---------------------------------------------------------------------------
  # Build matrix: Linux x64, macOS ARM64, Windows x64
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            lib: libsignalwire_agents.a
            archive_ext: tar.gz
          - os: macos-latest
            name: macos-arm64
            lib: libsignalwire_agents.a
            archive_ext: tar.gz
          - os: windows-latest
            name: windows-x64
            lib: Release/signalwire_agents.lib
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
          REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      # -- Platform-specific dependencies -------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install openssl -y

      # -- Build & test -------------------------------------------------------
      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir build && cd build
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release \
              -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
          ./run_tests

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL"
          cmake --build . --config Release
          ./Release/run_tests.exe

      # -- Package static library ---------------------------------------------
      - name: Package library (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          tar czf "libsignalwire-agents-${VERSION}-${{ matrix.name }}.tar.gz" \
            -C build ${{ matrix.lib }} \
            -C .. include/

      - name: Package library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.ref.outputs.version }}"
          $ARCHIVE = "libsignalwire-agents-${VERSION}-${{ matrix.name }}.zip"
          # Stage files into a temp directory for clean zip layout
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item "build/${{ matrix.lib }}" -Destination staging/signalwire_agents.lib
          Copy-Item -Recurse include -Destination staging/include
          Compress-Archive -Path staging/* -DestinationPath $ARCHIVE

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.name }}
          path: libsignalwire-agents-*

  # ---------------------------------------------------------------------------
  # Collect all artifacts and publish a single GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
          REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Package source tarball
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          tar czf "signalwire-agents-cpp-${VERSION}.tar.gz" \
            --exclude='.git' --exclude='build' .

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          generate_release_notes: true
          files: |
            signalwire-agents-cpp-*.tar.gz
            artifacts/libsignalwire-agents-*
