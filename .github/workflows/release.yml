# C++ has no central package registry. We publish a source tarball
# and pre-built static libraries as GitHub Release assets.
name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0). Must already exist.'
        required: true

jobs:
  # ---------------------------------------------------------------------------
  # CI gate — the full run-ci.sh gate set MUST pass before anything is built or
  # published. `build` declares `needs: ci` and `release` declares `needs: build`,
  # so a red gate mechanically blocks the release: no tarball, no library asset,
  # no GitHub Release can be cut without green CI. Mirrors test.yml's gate run so
  # there is no local/CI drift.
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signalwire-cpp
        uses: actions/checkout@v6
        with:
          path: signalwire-cpp

      - name: Checkout porting-sdk (mock servers + audit scripts + EMISSION corpus)
        uses: actions/checkout@v6
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Checkout signalwire-python (EMISSION oracle)
        uses: actions/checkout@v6
        with:
          repository: signalwire/signalwire-python
          path: signalwire-python
          ref: main

      - name: Setup Python (audit scripts + mock servers + libclang)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build deps (cmake + g++ + OpenSSL 3 headers)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev

      - name: Install pinned clang-format + clang-tidy 18.1.8 + clang-18 compiler
        run: |
          pip install "clang-format==18.1.8" "clang-tidy==18.1.8"
          sudo apt-get install -y clang-18
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

      - name: Install libclang Python bindings (SIGNATURES gate)
        run: pip install "clang==18.1.8" "libclang==18.1.1"

      - name: Resolve the matching libclang native lib (SW_LIBCLANG_PATH)
        run: |
          SO="$(python -c 'import os, glob, clang; d=os.path.join(os.path.dirname(clang.__file__), "native"); hits=[h for pat in ("libclang.so","libclang.dylib") for h in glob.glob(os.path.join(d, pat))]; print(hits[0] if hits else "")')"
          test -f "$SO"
          echo "SW_LIBCLANG_PATH=$SO" >> "$GITHUB_ENV"

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      - name: Install signalwire-python (EMISSION oracle) if not importable
        run: |
          if python -c "import signalwire.core.function_result" 2>/dev/null; then
            echo "signalwire-python already importable; skipping install"
          else
            pip install ./signalwire-python
          fi

      - name: Run CI gate script (full gate set)
        working-directory: signalwire-cpp
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
        run: bash scripts/run-ci.sh

  # ---------------------------------------------------------------------------
  # Build matrix: Linux x64, Linux ARM64, macOS ARM64
  # ---------------------------------------------------------------------------
  build:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-latest
            name: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
          REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      # -- Platform-specific dependencies -------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 cmake

      # -- Build & test -------------------------------------------------------
      - name: Build and test
        shell: bash
        run: |
          mkdir build && cd build
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release \
              -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
          ./run_tests

      # -- Package static library ---------------------------------------------
      - name: Package library
        shell: bash
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          tar czf "libsignalwire-agents-${VERSION}-${{ matrix.name }}.tar.gz" \
            -C build libsignalwire_agents.a \
            -C .. include/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: lib-${{ matrix.name }}
          path: libsignalwire-agents-*

  # ---------------------------------------------------------------------------
  # Collect all artifacts and publish a single GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
          REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Package source tarball
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          tar czf "/tmp/signalwire-agents-cpp-${VERSION}.tar.gz" \
            --exclude='.git' --exclude='build' .
          mv "/tmp/signalwire-agents-cpp-${VERSION}.tar.gz" .

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          generate_release_notes: true
          files: |
            signalwire-agents-cpp-*.tar.gz
            artifacts/libsignalwire-agents-*
