# C++ has no central package registry. We publish a source tarball
# and pre-built static library as GitHub Release assets.
name: Publish Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0). Must already exist.'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev

      - name: Build and test
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ./run_tests

      - name: Package source tarball
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          tar czf signalwire-agents-cpp-${VERSION}.tar.gz \
            --exclude='.git' --exclude='build' .

      - name: Package static library
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          tar czf libsignalwire-agents-${VERSION}-linux-x64.tar.gz \
            -C build libsignalwire_agents.a \
            -C .. include/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          generate_release_notes: true
          files: |
            signalwire-agents-cpp-*.tar.gz
            libsignalwire-agents-*.tar.gz
