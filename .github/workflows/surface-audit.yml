# Symbol-level surface audit (Layer B) against the Python reference.
#
# Every PR and nightly run regenerates port_surface.json from the C++ headers
# and diffs it against porting-sdk/python_surface.json. Unexcused missing or
# extra symbols fail the job. See:
#   - scripts/enumerate_surface.py   -- emitter
#   - PORT_OMISSIONS.md              -- Python symbols we deliberately skip
#   - PORT_ADDITIONS.md              -- C++-only symbols with no Python peer
#   - porting-sdk/scripts/diff_port_surface.py  -- diff tool (upstream)
name: Surface Audit

env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    paths:
      - 'include/**'
      - 'scripts/enumerate_surface.py'
      - 'PORT_OMISSIONS.md'
      - 'PORT_ADDITIONS.md'
      - 'port_surface.json'
      - '.github/workflows/surface-audit.yml'
  push:
    branches: [main]
  schedule:
    # Nightly: every day at 04:00 UTC. Catches drift introduced by upstream
    # python_surface.json updates without any C++ PR.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  surface-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signalwire-cpp
        uses: actions/checkout@v7

      - name: Checkout porting-sdk (reference surface)
        uses: actions/checkout@v7
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          # Wave-1 A+ campaign: pins the porting-sdk gate engines + new
          # PSDK-3/4/5 BEHAVIORAL rules (PAGINATION-CORPUS/RELAY-LIVENESS/
          # CA-VAR/SECRET-SCRUB) this PR's run-ci exercises. REVERT to main
          # (drop this ref:) when porting-sdk wave/1-aplus merges.
          ref: main
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Check port_surface.json is committed and up-to-date
        # `--check` regenerates in-memory and compares against the committed
        # file, stripping the volatile `generated_from` SHA. A `git diff
        # --exit-code` after a fresh regen could never pass because the script
        # embeds the current HEAD SHA, which by definition differs from the
        # SHA recorded when the committed file was generated.
        run: python3 scripts/enumerate_surface.py --check --output port_surface.json

      - name: Diff against Python reference
        run: |
          python3 porting-sdk/scripts/diff_port_surface.py \
              --reference porting-sdk/python_surface.json \
              --port-surface port_surface.json \
              --omissions PORT_OMISSIONS.md \
              --additions PORT_ADDITIONS.md

      # On failure, print the full JSON report for debugging.
      - name: Emit JSON report on failure
        if: failure()
        run: |
          python3 porting-sdk/scripts/diff_port_surface.py \
              --reference porting-sdk/python_surface.json \
              --port-surface port_surface.json \
              --omissions PORT_OMISSIONS.md \
              --additions PORT_ADDITIONS.md \
              --json || true
